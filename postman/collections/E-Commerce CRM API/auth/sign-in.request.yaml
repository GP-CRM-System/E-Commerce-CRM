$kind: http-request
name: Sign In
method: POST
url: '{{baseUrl}}/api/auth/sign-in/email'
order: 2000
headers:
    - key: Content-Type
      value: application/json
body:
    type: json
    content: |-
        {
          "email": "{{userEmail}}",
          "password": "{{userPassword}}"
        }
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          pm.test("Response is valid JSON", function () {
              pm.response.to.be.json;
          });

          pm.test("Response contains session data", function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("user");
              pm.expect(jsonData).to.have.property("session");
          });

          // Extract and store session token
          const jsonData = pm.response.json();
          if (jsonData.session && jsonData.session.token) {
              pm.collectionVariables.set("sessionToken", jsonData.session.token);
              console.log("Session token saved to collection variables");
          }
          if (jsonData.token) {
              pm.collectionVariables.set("sessionToken", jsonData.token);
              console.log("Token saved to collection variables");
          }
