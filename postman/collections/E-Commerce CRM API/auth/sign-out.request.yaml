$kind: http-request
name: Sign Out
method: POST
url: '{{baseUrl}}/api/auth/sign-out'
order: 3000
headers:
    - key: Authorization
      value: 'Bearer {{sessionToken}}'
scripts:
    - type: afterResponse
      language: text/javascript
      code: |-
          pm.test("Status code is 200", function () {
              pm.response.to.have.status(200);
          });

          // Clear session token after sign out
          pm.collectionVariables.unset("sessionToken");
          console.log("Session token cleared");
