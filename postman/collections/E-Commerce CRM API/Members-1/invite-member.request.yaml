$kind: http-request
name: Invite Member
method: POST
url: '{{baseUrl}}/api/auth/organization/invite-member'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{sessionToken}}'
body:
  type: json
  content: |-
    {
      "organizationId": "{{organizationId}}",
      "email": "{{memberEmail}}",
      "role": "member"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is valid JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Invitation was created", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
      });

      // Store invitation ID for subsequent requests
      const jsonData = pm.response.json();
      if (jsonData.id) {
          pm.collectionVariables.set("invitationId", jsonData.id);
          console.log("Invitation ID saved: " + jsonData.id);
      }
