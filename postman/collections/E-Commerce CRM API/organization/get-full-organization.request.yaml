$kind: http-request
name: Get Full Organization
method: GET
url: '{{baseUrl}}/api/auth/organization/get-full-organization'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{sessionToken}}'
queryParams:
  - key: organizationId
    value: '{{organizationId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is valid JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response contains organization details", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData).to.have.property("name");
          pm.expect(jsonData).to.have.property("members");
      });
